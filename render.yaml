databases:
  - name: book-a-call-db
    databaseName: bookacall
    user: bookacall
    plan: free
    region: oregon

services:
  - type: web
    name: book-a-call
    runtime: docker
    plan: free
    region: oregon
    branch: main
    autoDeployTrigger: commit
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /up
    buildFilter:
      paths:
        - Dockerfile
        - .dockerignore
        - render.yaml
        - backend/**
        - frontend/**
        - docker/**
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: PORT
        value: "10000"
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: book-a-call-db
          property: connectionString
      - key: QUEUE_CONNECTION
        value: sync
      - key: BOOTSTRAP_DEMO_DATA
        value: "true"
