services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    depends_on:
      backend-web:
        condition: service_healthy
    environment:
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://backend-web}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    command: ["/usr/local/bin/start-backend"]
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -r '$$socket = @fsockopen(\"127.0.0.1\", 9000); exit($$socket ? 0 : 1);'"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8080}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      DB_CONNECTION: pgsql
      DB_HOST: ${BACKEND_DB_HOST:-db}
      DB_PORT: 5432
      DB_DATABASE: ${BACKEND_DB_DATABASE:-${POSTGRES_DB:-bookacall}}
      DB_USERNAME: ${POSTGRES_USER:-bookacall}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-bookacall}
    expose:
      - "9000"
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor

  backend-web:
    build:
      context: .
      dockerfile: docker/backend-web/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/up >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    ports:
      - "${BACKEND_PORT:-8080}:80"
    volumes:
      - ./backend:/var/www/html:ro

  db:
    image: postgres:18.3
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bookacall}
      POSTGRES_USER: ${POSTGRES_USER:-bookacall}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookacall}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookacall} -d ${POSTGRES_DB:-bookacall}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - db_data:/var/lib/postgresql

  db-e2e:
    image: postgres:18.3
    environment:
      POSTGRES_DB: ${E2E_POSTGRES_DB:-bookacall_e2e}
      POSTGRES_USER: ${POSTGRES_USER:-bookacall}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookacall}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookacall} -d ${E2E_POSTGRES_DB:-bookacall_e2e}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - db_e2e_data:/var/lib/postgresql

  playwright:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    working_dir: /app
    environment:
      PLAYWRIGHT_BASE_URL: ${PLAYWRIGHT_BASE_URL:-http://frontend:5173}
      CI: ${CI:-}
    ipc: host
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
  backend_vendor:
  db_data:
  db_e2e_data:
